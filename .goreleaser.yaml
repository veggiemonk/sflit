# goreleaser config — https://goreleaser.com
# Releases are published on GitHub (github.com/veggiemonk/sflit) by
# .github/workflows/release.yml on every v* tag push.
#
# Version info is NOT injected via ldflags: internal/version reads Go's
# VCS build metadata (debug.ReadBuildInfo), so builds must keep -buildvcs
# enabled (the default) and run from a git checkout with tags present.
version: 2

project_name: sflit

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Breaking changes
      regexp: '^.*?(feat|fix)(\(.+\))?!:.+$'
      order: 0
    - title: Features
      regexp: '^.*?feat(\(.+\))?:.+$'
      order: 1
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"
      - "^style"
      - "^Merge "

release:
  github:
    owner: veggiemonk
    name: sflit
